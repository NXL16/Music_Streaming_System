syntax = "proto3";

package ingestion;

option go_package = "Music_Streaming_System/packages/shared-proto/ingestion";

service IngestionOrchestrator {
  rpc ProcessSong (ProcessRequest) returns (ProcessResponse);
}

message ProcessRequest {
  string song_id = 1;
  string user_id = 2;
  string storage_key = 3; 
}

message ProcessResponse {
  string job_id = 1;
  string status = 2; 
}